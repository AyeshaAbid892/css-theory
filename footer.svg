<svg width="900" height="130" viewBox="0 0 900 130" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d0221"/>
      <stop offset="50%"  stop-color="#1a0545"/>
      <stop offset="100%" stop-color="#0c1445"/>
    </linearGradient>
    <radialGradient id="o1" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#8b5cf6" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="o2" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#06b6d4" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="strip" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#8b5cf6"/>
      <stop offset="50%"  stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#e879f9"/>
      <stop offset="33%"  stop-color="#c4b5fd"/>
      <stop offset="66%"  stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#e879f9"/>
      <animateTransform attributeName="gradientTransform" type="translate"
        values="-1,0; 1,0; -1,0" dur="4s" repeatCount="indefinite"/>
    </linearGradient>
    <clipPath id="mc">
      <text x="450" y="72" text-anchor="middle"
        font-family="Georgia,serif"
        font-size="22" font-weight="bold" letter-spacing="0.5">
        From Zero to Styled - The CSS Journey.
      </text>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="900" height="130" rx="14" fill="url(#bg)"/>

  <!-- Orbs -->
  <ellipse cx="90"  cy="65" rx="170" ry="90" fill="url(#o1)">
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 14,8; 0,0" dur="9s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="810" cy="65" rx="160" ry="88" fill="url(#o2)">
    <animateTransform attributeName="transform" type="translate"
      values="0,0; -14,8; 0,0" dur="8s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Top strip -->
  <rect x="0" y="0" width="900" height="4" fill="url(#strip)" opacity="0.85"/>

  <!-- Bootcamp label -->
  <text x="450" y="36" text-anchor="middle"
    font-family="Georgia,serif" font-size="10"
    fill="#a5b4fc" fill-opacity="0.65" letter-spacing="3.5">
    MERN STACK + AI ENGINEERING BOOTCAMP  -  WEEK 2
  </text>

  <!-- Divider -->
  <rect x="280" y="44" width="340" height="1" fill="url(#strip)" rx="1" opacity="0.35"/>

  <!-- Main shimmer tagline -->
  <rect x="0" y="52" width="900" height="32" fill="url(#tg)" clip-path="url(#mc)"/>

  <!-- Sub tagline -->
  <text x="450" y="97" text-anchor="middle"
    font-family="Georgia,serif" font-size="10.5"
    fill="white" fill-opacity="0.35" letter-spacing="1.5">
    CSS Foundations  -  Selectors  -  Flexbox  -  Animations  -  Responsive Design
  </text>

  <!-- Pulsing dots -->
  <circle cx="430" cy="44" r="2.5" fill="#8b5cf6">
    <animate attributeName="opacity" values="0.9;0.2;0.9" dur="2s" begin="0s" repeatCount="indefinite"/>
  </circle>
  <circle cx="450" cy="44" r="2.5" fill="#ec4899">
    <animate attributeName="opacity" values="0.9;0.2;0.9" dur="2s" begin="-0.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="470" cy="44" r="2.5" fill="#06b6d4">
    <animate attributeName="opacity" values="0.9;0.2;0.9" dur="2s" begin="-1s" repeatCount="indefinite"/>
  </circle>

  <!-- Bottom strip -->
  <rect x="0" y="126" width="900" height="4" fill="url(#strip)" opacity="0.85"/>
</svg>
