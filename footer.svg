<svg width="900" height="140" viewBox="0 0 900 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d0221"/>
      <stop offset="50%"  stop-color="#1a0545"/>
      <stop offset="100%" stop-color="#0c1445"/>
    </linearGradient>
    <radialGradient id="o1" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#8b5cf6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="o2" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="#06b6d4" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="strip" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#8b5cf6"/>
      <stop offset="50%"  stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="900" height="140" rx="14" fill="url(#bg)"/>

  <!-- Subtle orbs -->
  <ellipse cx="100" cy="70" rx="180" ry="100" fill="url(#o1)">
    <animateTransform attributeName="transform" type="translate"
      values="0,0; 15,8; 0,0" dur="9s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="800" cy="70" rx="170" ry="95" fill="url(#o2)">
    <animateTransform attributeName="transform" type="translate"
      values="0,0; -15,8; 0,0" dur="8s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Top strip -->
  <rect x="0" y="0" width="900" height="4" fill="url(#strip)" opacity="0.8"/>

  <!-- Score table -->
  <text x="450" y="34" text-anchor="middle"
    font-family="Georgia,serif" font-size="10" fill="#a5b4fc"
    letter-spacing="3" fill-opacity="0.7">SCORE CARD</text>

  <!-- Divider -->
  <rect x="300" y="42" width="300" height="1" fill="url(#strip)" rx="1" opacity="0.4"/>

  <!-- Q01-Q05 -->
  <text x="180" y="64" text-anchor="middle"
    font-family="Georgia,serif" font-size="11" fill="#c4b5fd">Q01 - Q05</text>
  <text x="180" y="78" text-anchor="middle"
    font-family="Georgia,serif" font-size="9.5" fill="white" fill-opacity="0.38">Beginner</text>
  <text x="180" y="94" text-anchor="middle"
    font-family="Georgia,serif" font-size="13" font-weight="bold" fill="#6ee7b7">33 / 33</text>

  <!-- Divider vert -->
  <rect x="358" y="55" width="1" height="50" fill="white" fill-opacity="0.08" rx="1"/>

  <!-- Q06-Q08 -->
  <text x="450" y="64" text-anchor="middle"
    font-family="Georgia,serif" font-size="11" fill="#fdba74">Q06 - Q08</text>
  <text x="450" y="78" text-anchor="middle"
    font-family="Georgia,serif" font-size="9.5" fill="white" fill-opacity="0.38">Intermediate</text>
  <text x="450" y="94" text-anchor="middle"
    font-family="Georgia,serif" font-size="13" font-weight="bold" fill="#6ee7b7">27 / 27</text>

  <!-- Divider vert -->
  <rect x="541" y="55" width="1" height="50" fill="white" fill-opacity="0.08" rx="1"/>

  <!-- Q09-Q10 -->
  <text x="720" y="64" text-anchor="middle"
    font-family="Georgia,serif" font-size="11" fill="#f9a8d4">Q09 - Q10</text>
  <text x="720" y="78" text-anchor="middle"
    font-family="Georgia,serif" font-size="9.5" fill="white" fill-opacity="0.38">Advanced</text>
  <text x="720" y="94" text-anchor="middle"
    font-family="Georgia,serif" font-size="13" font-weight="bold" fill="#6ee7b7">20 / 20</text>

  <!-- Total row -->
  <rect x="200" y="108" width="500" height="1" fill="url(#strip)" rx="1" opacity="0.3"/>
  <text x="390" y="126" text-anchor="middle"
    font-family="Georgia,serif" font-size="10.5" fill="white" fill-opacity="0.4"
    letter-spacing="1">TOTAL</text>
  <text x="520" y="126" text-anchor="middle"
    font-family="Georgia,serif" font-size="12" font-weight="bold" fill="#6ee7b7">80 / 80</text>

  <!-- Bottom strip -->
  <rect x="0" y="136" width="900" height="4" fill="url(#strip)" opacity="0.8"/>
</svg>
